services:
  mysql:
    image: mysql:8.4
    container_name: optiacademic_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-optiacademic_db}
      MYSQL_USER: ${MYSQL_USER:-optiacademic}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_app_password}
    ports:
      - "${MYSQL_EXPOSED_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    container_name: optiacademic_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-OptiAcademic}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: "True"
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-optiacademic}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_app_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-optiacademic_db}
      SECRET_KEY: ${SECRET_KEY:-change_me_for_local_docker_only}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      BACKEND_CORS_ORIGINS: '${BACKEND_CORS_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173"]}'
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/public:/app/public

  frontend:
    container_name: optiacademic_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://127.0.0.1:8000/api/v1}
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  mysql_data:
    name: optiacademic_dev_mysql_data
